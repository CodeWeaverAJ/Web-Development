<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box1{
            background-color: red;
            position: sticky;
            top: 0px;
            /* position: absolute;
            top: 0px; */
        }
        .box2{
            background-color: green;
            /* position: relative;
            top: 45px;
            left: 20px; */
        }
        .box3{
            background-color: yellow;
        }
        .box4{
            background-color: blueviolet;
            /* position: fixed;
            bottom: 0px;
            right: 5px; */
        }

        .box{
            width: 80vw;
            height: 150px;
            border: 2px solid blue;
            padding: 10px;
            margin: 10px;
        }
        .parent{
            /*Exception transform, filter, or prespective properties can also make an element as positioned */
            border: 3px solid green;
            padding: 43px;
            margin: 34px;
            /* position: absolute; */
            /* position: relative; */
            /* transform: translate(0); */
            /* filter: invert(0); */
            /* perspective: 0em; */
        }
    </style>
</head>
<body>
    <div class="parent">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
    </div>
</body>
</html>
